<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ForTRANart · FORTRAN/WASM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:       #F2EFE5;
    --paper-shade: #E8E4D8;
    --grid:        #C8CFC2;
    --grid-major:  #A8B19E;
    --ink:         #1A2B47;
    --slate:       #2A2E33;
    --slate-soft:  #5A5F66;
    --oxblood:     #8B3A2E;
  }

  html, body { height: 100%; }

  body {
    background: var(--paper-shade);
    color: var(--slate);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
  }

  /* Nameplate */
  .nameplate {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 12px;
    border: 1px solid var(--slate);
    background: var(--paper);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .nameplate .sep { color: var(--grid-major); }
  .nameplate .num { color: var(--oxblood); }

  /* Main grid: plot on left, panel on right */
  main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 244px;
    gap: 10px;
  }

  .plot {
    position: relative;
    border: 1px solid var(--slate);
    background-color: var(--paper);
    background-image:
      repeating-linear-gradient(0deg,
        var(--grid) 0, var(--grid) 0.5px,
        transparent 0.5px, transparent 20px),
      repeating-linear-gradient(90deg,
        var(--grid) 0, var(--grid) 0.5px,
        transparent 0.5px, transparent 20px),
      repeating-linear-gradient(0deg,
        var(--grid-major) 0, var(--grid-major) 0.5px,
        transparent 0.5px, transparent 100px),
      repeating-linear-gradient(90deg,
        var(--grid-major) 0, var(--grid-major) 0.5px,
        transparent 0.5px, transparent 100px);
    overflow: hidden;
  }

  #paper {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Maker's stamp */
  .stamp {
    position: absolute;
    bottom: 14px;
    right: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    line-height: 1.45;
    letter-spacing: 0.08em;
    color: var(--slate);
    background: var(--paper);
    border: 1px solid var(--slate);
    padding: 7px 10px;
    text-align: right;
    pointer-events: none;
    user-select: none;
    min-width: 152px;
  }
  .stamp .when {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid var(--grid-major);
    color: var(--oxblood);
  }
  .stamp .engine {
    font-weight: 500;
    letter-spacing: 0.14em;
  }

  /* Panel */
  .panel {
    background: var(--paper);
    border: 1px solid var(--slate);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }

  .control-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-block > label,
  .group > label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--slate-soft);
  }

  .group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .group input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    border: 1px solid var(--slate);
    background: transparent;
    color: var(--ink);
    border-radius: 0;
    -moz-appearance: textfield;
  }
  .group input::-webkit-outer-spin-button,
  .group input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .group input:focus {
    outline: none;
    border-color: var(--oxblood);
    background: rgba(139, 58, 46, 0.05);
  }

  .model-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  #params-host {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 4px;
  }
  .actions button.primary {
    grid-column: 1 / -1;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    padding: 8px 10px;
    border: 1px solid var(--slate);
    background: var(--paper);
    color: var(--slate);
    cursor: pointer;
    border-radius: 0;
    text-transform: uppercase;
    transition: background-color 80ms linear, color 80ms linear;
  }
  button:hover { background: var(--slate); color: var(--paper); }
  button:active,
  button.engaged {
    background: var(--oxblood);
    color: var(--paper);
    border-color: var(--oxblood);
  }

  .model-btn {
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 8px 6px;
  }

  /* Status */
  .status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    padding: 8px 12px;
    border: 1px solid var(--slate);
    background: var(--paper);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .status .sep { color: var(--grid-major); }
  .status .indicator { margin-left: auto; color: var(--oxblood); }
  .status .indicator.idle { color: var(--slate-soft); }
  .status .engine-tag { color: var(--slate-soft); }
  .status .engine-tag.live { color: var(--ink); }

  @media (max-width: 760px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(320px, 1fr) auto;
    }
    .stamp { font-size: 9px; padding: 6px 8px; min-width: 0; }
  }
</style>
</head>
<body>

<header class="nameplate">
  <span>ForTRANart</span>
  <span class="sep">·</span>
  <span id="model-name">LORENZ-63</span>
  <span class="sep">·</span>
  <span>FORTRAN/WASM</span>
  <span class="sep">·</span>
  <span class="num">FI / 017</span>
</header>

<main>
  <section class="plot">
    <canvas id="paper" aria-label="Strange attractor plot"></canvas>
    <div class="stamp" id="stamp" aria-hidden="true"></div>
  </section>

  <section class="panel" aria-label="Plotter controls">
    <div class="control-block">
      <label>Model</label>
      <div class="model-grid">
        <button class="model-btn engaged" data-model="lorenz">Lorenz</button>
        <button class="model-btn" data-model="aizawa">Aizawa</button>
        <button class="model-btn" data-model="thomas">Thomas</button>
        <button class="model-btn" data-model="halvorsen">Halvorsen</button>
      </div>
    </div>

    <div class="control-block">
      <label>Parameters</label>
      <div id="params-host"></div>
    </div>

    <div class="group">
      <label for="dt">Step &nbsp;dt</label>
      <input id="dt" type="number" value="0.0050" step="0.001" inputmode="decimal" min="0.0001">
    </div>

    <div class="actions">
      <button class="primary" id="play">Plot</button>
      <button id="pause">Pause</button>
      <button id="clear">Clear</button>
    </div>
  </section>
</main>

<footer class="status">
  <span>STEP <span id="step">000000</span></span>
  <span class="sep">|</span>
  <span>T <span id="time">0000.000</span></span>
  <span class="sep">|</span>
  <span class="engine-tag" id="engine-tag">engine: js</span>
  <span class="indicator" id="indicator">PLOTTING</span>
</footer>

<script>
(() => {
  'use strict';

  // The bundler replaces this token with a base64-encoded .wasm payload.
  // If the placeholder is still here, we silently use the JS fallback.
  const WASM_BASE64 = "{{WASM_BASE64}}";

  const $ = (id) => document.getElementById(id);
  const canvas = $('paper');
  const ctx = canvas.getContext('2d');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- Model registry ----------
  // Each model holds: its id (matches the Fortran model_id), its ordered
  // params (mapping to pars(1..N) on the Fortran side), default dt, seed
  // point, projection center & span, and a velocity reference used to
  // calibrate the plotter's variable line weight.

  const MODELS = {
    lorenz: {
      id: 0,
      label: 'LORENZ-63',
      params: [
        { glyph: 'σ', label: 'Sigma', value: 10.0,             step: 0.1  },
        { glyph: 'ρ', label: 'Rho',   value: 28.0,             step: 0.1  },
        { glyph: 'β', label: 'Beta',  value: 2.6666666666666667, step: 0.01 },
      ],
      dt: 0.005,
      seed:   [0.1, 0.0, 0.0],
      center: [0.0, 0.0, 25.0],
      span:   80,
      vmagRef: 32,
    },
    aizawa: {
      id: 1,
      label: 'AIZAWA',
      params: [
        { glyph: 'a', label: 'A', value: 0.95, step: 0.01 },
        { glyph: 'b', label: 'B', value: 0.70, step: 0.01 },
        { glyph: 'c', label: 'C', value: 0.60, step: 0.01 },
        { glyph: 'd', label: 'D', value: 3.50, step: 0.05 },
        { glyph: 'e', label: 'E', value: 0.25, step: 0.01 },
        { glyph: 'f', label: 'F', value: 0.10, step: 0.01 },
      ],
      dt: 0.010,
      seed:   [0.1,  0.0, 0.0],
      center: [0.0,  0.0, 0.0],
      span:   4.6,
      vmagRef: 3.5,
    },
    thomas: {
      id: 2,
      label: 'THOMAS',
      params: [
        { glyph: 'b', label: 'B', value: 0.19, step: 0.005 },
      ],
      dt: 0.05,
      seed:   [1.1,  1.1, -0.01],
      center: [0.0,  0.0,  0.0 ],
      span:   12,
      vmagRef: 1.8,
    },
    halvorsen: {
      id: 3,
      label: 'HALVORSEN',
      params: [
        { glyph: 'a', label: 'A', value: 1.89, step: 0.01 },
      ],
      dt: 0.005,
      seed:   [-1.48, -1.51, 2.04],
      center: [ 0.0,   0.0,  0.0 ],
      span:   22,
      vmagRef: 30,
    },
  };

  let currentModelKey = 'lorenz';
  const model = () => MODELS[currentModelKey];

  const state = {
    running: true,
    step: 0,
    t: 0,
    dt: MODELS.lorenz.dt,
    x: 0.1, y: 0.0, z: 0.0,
    angle: 0,
    angleRate: reduceMotion ? 0 : 0.0014,
    lastPx: null,
  };

  const fortran = {
    ready: false,
    exports: null,
    memory: null,
    buffer: null,
  };

  // ---------- WASM bootstrap ----------

  async function initWasm() {
    if (!WASM_BASE64 || WASM_BASE64.startsWith('{{')) {
      return false;
    }
    try {
      const raw = atob(WASM_BASE64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

      const memory = new WebAssembly.Memory({ initial: 4, maximum: 256 });
      const imports = { env: { memory } };

      const { instance } = await WebAssembly.instantiate(bytes, imports);
      const ex = instance.exports;

      const addr = ex.get_buffer_address();
      const cap  = ex.get_buffer_capacity();

      fortran.memory  = memory;
      fortran.exports = ex;
      fortran.buffer  = new Float64Array(memory.buffer, addr, cap);
      fortran.ready = true;

      $('engine-tag').textContent = 'engine: fortran/wasm';
      $('engine-tag').classList.add('live');
      return true;
    } catch (err) {
      console.warn('[plotter] WASM init failed, using JS fallback:', err);
      return false;
    }
  }

  // ---------- Model application ----------

  function renderParams() {
    const host = $('params-host');
    host.innerHTML = '';
    model().params.forEach((p, i) => {
      const g = document.createElement('div');
      g.className = 'group';

      const lab = document.createElement('label');
      lab.textContent = `${p.label} \u00A0${p.glyph}`;

      const inp = document.createElement('input');
      inp.type = 'number';
      inp.step = String(p.step);
      inp.value = p.value.toFixed(4);
      inp.inputMode = 'decimal';
      inp.addEventListener('change', () => {
        const v = parseFloat(inp.value);
        if (Number.isFinite(v)) {
          p.value = v;
          if (fortran.ready) fortran.exports.set_param(i, v);
          stampPaper();
        }
      });

      g.appendChild(lab);
      g.appendChild(inp);
      host.appendChild(g);
    });
  }

  function applyModel(reseed) {
    const m = model();

    $('model-name').textContent = m.label;
    document.querySelectorAll('[data-model]').forEach((b) => {
      b.classList.toggle('engaged', b.dataset.model === currentModelKey);
    });

    if (fortran.ready) {
      fortran.exports.set_model(m.id);
      m.params.forEach((p, i) => fortran.exports.set_param(i, p.value));
      fortran.exports.set_dt(m.dt);
      if (reseed) fortran.exports.reset_state(m.seed[0], m.seed[1], m.seed[2]);
    }

    state.dt = m.dt;
    $('dt').value = m.dt.toFixed(4);
    if (reseed) {
      state.x = m.seed[0];
      state.y = m.seed[1];
      state.z = m.seed[2];
    }

    renderParams();
  }

  // ---------- Integrator (JS fallback mirrors the Fortran exactly) ----------

  function deriv(x, y, z) {
    const p = model().params;
    switch (currentModelKey) {
      case 'lorenz':
        return [
          p[0].value * (y - x),
          x * (p[1].value - z) - y,
          x * y - p[2].value * z,
        ];
      case 'aizawa': {
        const a = p[0].value, b = p[1].value, c = p[2].value;
        const d = p[3].value, e = p[4].value, f = p[5].value;
        return [
          (z - b) * x - d * y,
          d * x + (z - b) * y,
          c + a*z - z*z*z/3 - (x*x + y*y) * (1 + e*z) + f*z*x*x*x,
        ];
      }
      case 'thomas': {
        const b = p[0].value;
        return [
          Math.sin(y) - b * x,
          Math.sin(z) - b * y,
          Math.sin(x) - b * z,
        ];
      }
      case 'halvorsen': {
        const a = p[0].value;
        return [
          -a*x - 4*y - 4*z - y*y,
          -a*y - 4*z - 4*x - z*z,
          -a*z - 4*x - 4*y - x*x,
        ];
      }
    }
    return [0, 0, 0];
  }

  function stepRK4() {
    const h = state.dt, half = 0.5 * h, sixth = h / 6;
    const [k1x, k1y, k1z] = deriv(state.x,            state.y,            state.z);
    const [k2x, k2y, k2z] = deriv(state.x + half*k1x, state.y + half*k1y, state.z + half*k1z);
    const [k3x, k3y, k3z] = deriv(state.x + half*k2x, state.y + half*k2y, state.z + half*k2z);
    const [k4x, k4y, k4z] = deriv(state.x + h*k3x,    state.y + h*k3y,    state.z + h*k3z);
    state.x += sixth * (k1x + 2*k2x + 2*k3x + k4x);
    state.y += sixth * (k1y + 2*k2y + 2*k3y + k4y);
    state.z += sixth * (k1z + 2*k2z + 2*k3z + k4z);
  }

  // ---------- Projection & drawing ----------

  function project(x, y, z) {
    const m = model();
    const c = Math.cos(state.angle), s = Math.sin(state.angle);
    const xr = (x - m.center[0]) * c - (y - m.center[1]) * s;
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    const scale = Math.min(canvas.width, canvas.height) / m.span;
    return [
      cx + xr * scale,
      cy - (z - m.center[2]) * scale,
    ];
  }

  function drawSegment(x, y, z, vmag) {
    const m = model();
    const [px, py] = project(x, y, z);
    if (state.lastPx) {
      const t = Math.min(vmag / m.vmagRef, 1.0);
      const baseW = 1.6 - 1.1 * t;
      ctx.lineWidth = baseW * (window.devicePixelRatio || 1);
      ctx.beginPath();
      ctx.moveTo(state.lastPx[0], state.lastPx[1]);
      ctx.lineTo(px, py);
      ctx.stroke();
    }
    state.lastPx = [px, py];
  }

  // ---------- Main loop ----------

  function tick() {
    if (!state.running) return;

    const N = 60;

    if (fortran.ready) {
      fortran.exports.integrate(N);
      const buf = fortran.buffer;
      for (let i = 0; i < N; i++) {
        const x = buf[3*i], y = buf[3*i+1], z = buf[3*i+2];
        const [dx, dy, dz] = deriv(x, y, z);
        drawSegment(x, y, z, Math.hypot(dx, dy, dz));
        if (i === N - 1) { state.x = x; state.y = y; state.z = z; }
      }
    } else {
      for (let i = 0; i < N; i++) {
        stepRK4();
        const [dx, dy, dz] = deriv(state.x, state.y, state.z);
        drawSegment(state.x, state.y, state.z, Math.hypot(dx, dy, dz));
      }
    }

    state.step += N;
    state.t    += N * state.dt;
    state.angle += state.angleRate;

    $('step').textContent = String(state.step).padStart(6, '0');
    $('time').textContent = state.t.toFixed(3).padStart(8, '0');

    requestAnimationFrame(tick);
  }

  // ---------- Canvas plumbing ----------

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = Math.floor(rect.width  * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width  = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ink = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim();
    ctx.strokeStyle = ink;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    state.lastPx = null;
  }

  function clearPlot() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    state.step = 0;
    state.t = 0;
    state.angle = 0;
    state.lastPx = null;
    const m = model();
    state.x = m.seed[0];
    state.y = m.seed[1];
    state.z = m.seed[2];
    if (fortran.ready) {
      fortran.exports.reset_state(state.x, state.y, state.z);
    }
    stampPaper();
  }

  function stampPaper() {
    const m = model();
    const now = new Date();
    const iso = now.toISOString().slice(0, 19).replace('T', ' ') + 'Z';

    let lines = '';
    const ps = m.params;
    for (let i = 0; i < ps.length; i += 2) {
      const left  = `${ps[i].glyph} ${ps[i].value.toFixed(4)}`;
      const right = (i + 1 < ps.length)
        ? `${ps[i+1].glyph} ${ps[i+1].value.toFixed(4)}`
        : '';
      lines += '<div>' + left + (right ? '\u00A0\u00A0' + right : '') + '</div>';
    }
    lines += '<div>dt ' + state.dt.toFixed(4) + '</div>';

    $('stamp').innerHTML =
      '<div class="engine">ForTRANart · FI 017</div>' +
      '<div>' + m.label + '</div>' +
      lines +
      '<div class="when">' + iso + '</div>';
  }

  // ---------- Controls ----------

  $('dt').addEventListener('change', () => {
    const v = parseFloat($('dt').value);
    if (Number.isFinite(v) && v > 0) {
      state.dt = v;
      if (fortran.ready) fortran.exports.set_dt(v);
      stampPaper();
    }
  });

  $('play').addEventListener('click', () => {
    if (!state.running) {
      state.running = true;
      $('indicator').textContent = 'PLOTTING';
      $('indicator').classList.remove('idle');
      tick();
    }
  });

  $('pause').addEventListener('click', () => {
    state.running = false;
    $('indicator').textContent = 'IDLE';
    $('indicator').classList.add('idle');
  });

  $('clear').addEventListener('click', clearPlot);

  document.querySelectorAll('[data-model]').forEach((b) => {
    b.addEventListener('click', () => {
      currentModelKey = b.dataset.model;
      applyModel(true);
      clearPlot();
      if (!state.running) {
        state.running = true;
        $('indicator').textContent = 'PLOTTING';
        $('indicator').classList.remove('idle');
        tick();
      }
    });
  });

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizeCanvas, 80);
  });

  // ---------- Boot ----------

  (async () => {
    resizeCanvas();
    await initWasm();
    applyModel(true);
    stampPaper();
    tick();
  })();
})();
</script>
</body>
</html>
